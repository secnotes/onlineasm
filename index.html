<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Online Disassembler and Assembler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <script>
        (function() {
            // 先检测主题和语言，在渲染前完成
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const savedTheme = localStorage.getItem('theme');
            document.documentElement.setAttribute('data-theme', savedTheme || (prefersDark ? 'dark' : 'light'));

            const savedLang = localStorage.getItem('lang');
            const browserLang = navigator.language || navigator.userLanguage;
            const isChinese = browserLang.startsWith('zh');
            const lang = savedLang || (isChinese ? 'zh' : 'en');
            document.documentElement.setAttribute('data-lang', lang);

            // 设置全局语言变量，供后续使用
            window.__initialLang = lang;
        })();
    </script>

    <style>
        :root {
            --bg-gradient-start: #f0f4f8;
            --bg-gradient-end: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --panel-bg: #ffffff;
            --panel-border: #e2e8f0;
            --input-bg: #f8fafc;
            --input-border: #cbd5e1;
            --input-text: #1e293b;
            --textarea-bg: #f1f5f9;
            --textarea-text: #0369a1;
            --textarea-placeholder: #94a3b8;
            --accent-color: #0ea5e9;
            --accent-light: rgba(14, 165, 233, 0.1);
            --accent-shadow: rgba(14, 165, 233, 0.25);
            --btn-primary: #0ea5e9;
            --btn-primary-hover: #0284c7;
            --btn-secondary: #22c55e;
            --btn-secondary-hover: #16a34a;
            --table-header-bg: #f1f5f9;
            --table-row-hover: rgba(14, 165, 233, 0.05);
            --table-border: #e2e8f0;
            --address-color: #0ea5e9;
            --bytes-color: #ef4444;
            --mnemonic-color: #22c55e;
            --operands-color: #f97316;
            --success-bg: rgba(34, 197, 94, 0.1);
            --success-text: #16a34a;
            --error-bg: rgba(239, 68, 68, 0.1);
            --error-text: #dc2626;
            --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --card-shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --panel-bg: rgba(30, 41, 59, 0.8);
            --panel-border: rgba(71, 85, 105, 0.4);
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: rgba(71, 85, 105, 0.5);
            --input-text: #f1f5f9;
            --textarea-bg: rgba(15, 23, 42, 0.5);
            --textarea-text: #22d3ee;
            --textarea-placeholder: #64748b;
            --accent-color: #22d3ee;
            --accent-light: rgba(34, 211, 238, 0.15);
            --accent-shadow: rgba(34, 211, 238, 0.4);
            --btn-primary: #22d3ee;
            --btn-primary-hover: #06b6d4;
            --btn-secondary: #4ade80;
            --btn-secondary-hover: #22c55e;
            --table-header-bg: rgba(30, 41, 59, 0.6);
            --table-row-hover: rgba(34, 211, 238, 0.08);
            --table-border: rgba(71, 85, 105, 0.3);
            --address-color: #22d3ee;
            --bytes-color: #f87171;
            --mnemonic-color: #4ade80;
            --operands-color: #fb923c;
            --success-bg: rgba(74, 222, 128, 0.15);
            --success-text: #4ade80;
            --error-bg: rgba(248, 113, 113, 0.15);
            --error-text: #f87171;
            --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --card-shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 24px;
            color: var(--text-primary);
            transition: background 0.4s ease, color 0.4s ease;
        }

        .controls {
            position: fixed;
            top: 24px;
            right: 24px;
            display: flex;
            gap: 8px;
            z-index: 1000;
        }
        .control-btn {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.25s ease;
            box-shadow: var(--card-shadow);
            color: var(--text-secondary);
        }
        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow-hover);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            padding-top: 8px;
        }
        .header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }
        [data-theme="dark"] .header h1 {
            background: linear-gradient(135deg, #22d3ee 0%, #4ade80 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 400;
        }

        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 920px;
            margin: 0 auto;
            transition: max-width 0.4s ease;
        }
        .cards-container.side-by-side {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 1400px;
            gap: 24px;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            overflow: visible;
            display: flex;
            flex-direction: column;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
        }
        .card:hover {
            box-shadow: var(--card-shadow-hover);
            transform: translateY(-2px);
        }
        [data-theme="dark"] .card {
            backdrop-filter: blur(12px);
        }

        .card-header {
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 600;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card-header::before {
            content: '';
            width: 4px;
            height: 20px;
            border-radius: 2px;
            background: var(--btn-primary);
        }
        .card-header-asm::before {
            background: var(--btn-secondary);
        }

        .card-body {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            min-width: 0;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }
        .form-group.full { grid-column: span 4; }

        label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        select, input {
            padding: 10px 14px;
            border: 1px solid var(--input-border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--input-text);
            font-size: 14px;
            transition: all 0.2s ease;
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
        }
        select:hover, input:hover {
            border-color: var(--accent-color);
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-light);
        }
        select:disabled { opacity: 0.5; cursor: not-allowed; }

        textarea {
            width: 100%;
            flex: 1;
            min-height: 120px;
            padding: 14px;
            border: 1px solid var(--input-border);
            border-radius: 10px;
            background: var(--textarea-bg);
            color: var(--textarea-text);
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            transition: all 0.2s ease;
        }
        textarea:hover {
            border-color: var(--accent-color);
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-light);
        }
        textarea::placeholder { color: var(--textarea-placeholder); }

        .btn-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #fff;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 100%);
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .btn:hover::before { opacity: 1; }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-shadow);
        }
        .btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px var(--accent-shadow);
        }
        .btn:focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }
        .btn-disasm {
            background: var(--btn-primary);
            box-shadow: 0 2px 8px rgba(14, 165, 233, 0.3);
        }
        .btn-disasm:hover { background: var(--btn-primary-hover); }
        .btn-asm {
            background: var(--btn-secondary);
            box-shadow: 0 2px 8px rgba(34, 197, 94, 0.3);
        }
        .btn-asm:hover { background: var(--btn-secondary-hover); }

        [data-theme="dark"] .btn-disasm {
            box-shadow: 0 2px 8px rgba(34, 211, 238, 0.4);
        }
        [data-theme="dark"] .btn-asm {
            box-shadow: 0 2px 8px rgba(74, 222, 128, 0.4);
        }

        .copy-format-select {
            padding: 10px 8px;
            border: 1px solid var(--input-border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--input-text);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            max-width: 80px;
        }
        .copy-format-select:hover { border-color: var(--accent-color); }
        .copy-format-select:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 3px var(--accent-light); }

        .card-header-asm::before {
            background: var(--btn-secondary);
        }

        .footer {
            text-align: center;
            padding: 32px 20px 24px;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 13px;
        }
        .footer a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .footer a:hover {
            color: var(--text-primary);
        }
        .footer-divider {
            margin: 0 8px;
            opacity: 0.4;
        }
        .footer-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .footer-main .github-icon {
            margin-left: 2px;
        }
        .github-icon {
            fill: var(--accent-color);
            transition: fill 0.2s ease;
        }
        .footer-main:hover .github-icon {
            fill: var(--text-primary);
        }
        .footer-powered {
            margin-top: 12px;
            font-size: 12px;
        }

        .output-area {
            flex: 1;
            min-height: 150px;
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            background: var(--textarea-bg);
            padding: 12px;
        }

        .output-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
        }
        .output-table th {
            background: var(--table-header-bg);
            color: var(--accent-color);
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--table-border);
            position: sticky;
            top: 0;
            font-weight: 500;
        }
        .output-table td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--table-border);
        }
        .output-table tr:last-child td {
            border-bottom: none;
        }
        .output-table tr:hover { background: var(--table-row-hover); }
        .address { color: var(--address-color); font-weight: 500; }
        .bytes { color: var(--bytes-color); }
        .mnemonic { color: var(--mnemonic-color); font-weight: 600; }
        .operands { color: var(--operands-color); }

        .info-text { color: var(--text-muted); font-size: 12px; }

        .placeholder-text {
            color: var(--text-muted);
            text-align: center;
            padding: 48px 20px;
            font-size: 14px;
        }

        .status {
            padding: 12px 16px;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            margin-top: 12px;
        }
        .status.success { background: var(--success-bg); color: var(--success-text); }
        .status.error { background: var(--error-bg); color: var(--error-text); }

        .result-bytes {
            margin-top: 12px;
            padding: 14px;
            background: var(--textarea-bg);
            border-radius: 10px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            word-break: break-all;
            color: var(--bytes-color);
            border: 1px solid var(--panel-border);
        }

        @media (max-width: 900px) {
            body { padding: 16px; }
            .controls { top: 12px; right: 12px; }
            .control-btn { width: 40px; height: 40px; font-size: 16px; border-radius: 10px; }
            .header h1 { font-size: 1.5rem; }
            .card-body { padding: 16px; }
            .form-row { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .form-group.full { grid-column: span 2; }
        }
        @media (max-width: 1000px) {
            .cards-container.side-by-side {
                grid-template-columns: 1fr;
                max-width: 900px;
            }
        }
    </style>
</head>
<body>
    <div class="controls">
        <button class="control-btn" onclick="toggleLayout()" title="Toggle Layout">
            <svg id="layout-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M3 3h8v8H3V3zm0 10h8v8H3v-8zm10-10h8v8h-8V3zm0 10h8v8h-8v-8z"/>
            </svg>
        </button>
        <button class="control-btn" onclick="toggleLang()" title="Language"><span id="lang-icon">EN</span></button>
        <button class="control-btn" onclick="toggleTheme()" title="Theme"><span id="theme-icon">🌙</span></button>
    </div>

    <div class="header">
        <h1 data-i18n="pageTitle"></h1>
        <p data-i18n="subtitle"></p>
    </div>

    <div class="cards-container">
        <!-- 反汇编器卡片 -->
        <div class="card">
            <div class="card-header" data-i18n="disasmTitle"></div>
            <div class="card-body">
                <div class="form-row">
                    <div class="form-group">
                        <label data-i18n="architecture"></label>
                        <select id="disasm-arch" onchange="updateDisasmModeOptions()">
                            <option value="0">ARM</option>
                            <option value="1">ARM64</option>
                            <option value="2">MIPS</option>
                            <option value="3" selected>x86</option>
                            <option value="4">PowerPC</option>
                            <option value="5">SPARC</option>
                            <option value="6">SystemZ</option>
                            <option value="7">XCore</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="endianness"></label>
                        <select id="disasm-endian">
                            <option value="0" selected data-i18n-option="littleEndian"></option>
                            <option value="-2147483648" data-i18n-option="bigEndian"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="mode"></label>
                        <select id="disasm-mode"></select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="offset"></label>
                        <input type="text" id="disasm-offset" value="0x10000">
                    </div>
                </div>

                <div class="form-group full">
                    <label data-i18n="machineCode"></label>
                    <textarea id="disasm-input">55 31 D2 89 E5 8B 45 08 89 5D FC 8B 4D 10</textarea>
                </div>

                <div class="btn-row">
                    <button class="btn btn-disasm" onclick="disassemble()" data-i18n="disassembleBtn"></button>
                    <button class="btn btn-disasm" onclick="copyDisasmResult()" data-i18n="copyBtn"></button>
                </div>

                <div class="form-group full" style="flex:1; display:flex; flex-direction:column;">
                    <label data-i18n="disassemblyResult"></label>
                    <div class="output-area" id="disasm-output">
                        <p class="placeholder-text" data-i18n="outputPlaceholder"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 汇编器卡片 -->
        <div class="card">
            <div class="card-header card-header-asm" data-i18n="asmTitle"></div>
            <div class="card-body">
                <div class="form-row">
                    <div class="form-group">
                        <label data-i18n="architecture"></label>
                        <select id="asm-arch" onchange="updateAsmModeOptions()">
                            <option value="1">ARM</option>
                            <option value="2">ARM64</option>
                            <option value="3">MIPS</option>
                            <option value="4" selected>x86</option>
                            <option value="5">PowerPC</option>
                            <option value="6">SPARC</option>
                            <option value="7">SystemZ</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="endianness"></label>
                        <select id="asm-endian">
                            <option value="0" selected data-i18n-option="littleEndian"></option>
                            <option value="1073741824" data-i18n-option="bigEndian"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="mode"></label>
                        <select id="asm-mode"></select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="syntax"></label>
                        <select id="asm-syntax">
                            <option value="1" selected>Intel</option>
                            <option value="2">AT&T</option>
                            <option value="4">NASM</option>
                            <option value="8">MASM</option>
                            <option value="16">GAS</option>
                        </select>
                    </div>
                </div>

                <div class="form-group full">
                    <label data-i18n="assemblyCode"></label>
                    <textarea id="asm-input">push rbp
xor edx, edx
mov ebp, esp
mov eax, dword ptr [rbp+8]</textarea>
                </div>

                <div class="btn-row">
                    <button class="btn btn-asm" onclick="assemble()" data-i18n="assembleBtn"></button>
                    <button class="btn btn-asm" onclick="copyAsmResult()" data-i18n="copyBtn"></button>
                    <select id="asm-copy-format" class="copy-format-select" onchange="updateAsmResultFormat()">
                        <option value="hex" data-i18n-option="formatHex"></option>
                        <option value="inline" data-i18n-option="formatInline"></option>
                        <option value="carray" data-i18n-option="formatCArray"></option>
                        <option value="python" data-i18n-option="formatPython"></option>
                    </select>
                </div>

                <div class="form-group full" style="flex:1; display:flex; flex-direction:column;">
                    <label data-i18n="assemblyResult"></label>
                    <div class="output-area" id="asm-output">
                        <p class="placeholder-text" data-i18n="asmOutputPlaceholder"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

        <div class="footer-main">
            <span>© 2026</span>

    <script>
        // ==================== 国际化 ====================
        const i18n = {
            zh: {
                title: '在线反汇编器和汇编器',

        let currentLang = 'zh';
        function t(key, params = {}) {
            let text = i18n[currentLang][key] || i18n['zh'][key] || key;
            for (const [k, v] of Object.entries(params)) text = text.replace(`{${k}}`, v);
            return text;
        }
        function updateLanguage() {
            document.title = t('title');
            document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.getAttribute('data-i18n')));
            document.querySelectorAll('[data-i18n-option]').forEach(el => el.textContent = t(el.getAttribute('data-i18n-option')));
            updateDisasmModeOptions();
            updateAsmModeOptions();
        }
        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.documentElement.setAttribute('data-lang', currentLang);
            localStorage.setItem('lang', currentLang);
            document.getElementById('lang-icon').textContent = currentLang === 'zh' ? 'EN' : '中';
            updateLanguage();
        }

        // ==================== 主题 ====================
        function toggleTheme() {
            const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('theme-icon').textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }

        // ==================== 模式配置 ====================
        function getDisasmModes() {
            return {
                0: [{ value: 0, text: t('modeARM'), default: true }, { value: 16, text: t('modeThumb') }],
                1: [{ value: 0, text: t('modeARM64'), default: true }],
                2: [{ value: 4, text: t('modeMIPS32'), default: true }, { value: 8, text: t('modeMIPS64') }],
                3: [{ value: 2, text: t('mode16bit') }, { value: 4, text: t('mode32bit') }, { value: 8, text: t('mode64bit'), default: true }],
                4: [{ value: 4, text: t('mode32bit') }, { value: 8, text: t('mode64bit'), default: true }],
                5: [{ value: 0, text: t('modeSparc'), default: true }, { value: 16, text: t('modeSparcV9') }],
                6: [{ value: 0, text: t('modeSystemZ'), default: true }],
                7: [{ value: 0, text: 'XCore', default: true }]
            };
        }
        function getAsmModes() {
            return {
                1: [{ value: 1, text: t('modeARM'), default: true }, { value: 16, text: t('modeThumb') }],
                2: [{ value: 0, text: t('modeARM64'), default: true }],
                3: [{ value: 4, text: t('modeMIPS32'), default: true }, { value: 8, text: t('modeMIPS64') }],
                4: [{ value: 2, text: t('mode16bit') }, { value: 4, text: t('mode32bit') }, { value: 8, text: t('mode64bit'), default: true }],
                5: [{ value: 4, text: t('mode32bit') }, { value: 8, text: t('mode64bit'), default: true }],
                6: [{ value: 4, text: t('mode32bit'), default: true }, { value: 8, text: t('mode64bit') }],
                7: [{ value: 0, text: t('modeSystemZ'), default: true }]
            };
        }

        function updateDisasmModeOptions() {
            const arch = parseInt(document.getElementById('disasm-arch').value);
            const modeSelect = document.getElementById('disasm-mode');
            const modes = getDisasmModes()[arch] || [];
            modeSelect.innerHTML = '';
            modes.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.value;
                opt.textContent = m.text;
                opt.selected = m.default;
                modeSelect.appendChild(opt);
            });
        }
        function updateAsmModeOptions() {
            const arch = parseInt(document.getElementById('asm-arch').value);
            const modeSelect = document.getElementById('asm-mode');
            const syntaxSelect = document.getElementById('asm-syntax');
            const modes = getAsmModes()[arch] || [];
            modeSelect.innerHTML = '';
            modes.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.value;
                opt.textContent = m.text;
                opt.selected = m.default;
                modeSelect.appendChild(opt);
            });
            syntaxSelect.disabled = arch !== 4;
        }

        // ==================== 反汇编 ====================
        let csDecoder = null;
        let lastDisasmResult = null;

        function initCsDecoder() {
            const arch = parseInt(document.getElementById('disasm-arch').value);
            const mode = parseInt(document.getElementById('disasm-mode').value) | parseInt(document.getElementById('disasm-endian').value);
            try {
                const newDecoder = new cs.Capstone(arch, mode);
                if (csDecoder) csDecoder.close();
                csDecoder = newDecoder;
                return true;
            } catch (e) { return false; }
        }

        function formatHex(v, l) { return ('00000000' + v.toString(16).toUpperCase()).slice(-l); }

        function disassemble() {
            const outputDiv = document.getElementById('disasm-output');
            if (!initCsDecoder()) { outputDiv.innerHTML = `<div class="status error">${t('errorInit')}</div>`; return; }

            const input = document.getElementById('disasm-input').value.trim();
            if (!input) { outputDiv.innerHTML = `<div class="status error">${t('errorEmpty')}</div>`; return; }

            try {
                const bytes = [];
                const cleaned = input.replace(/[^a-fA-F0-9]/g, '');
                for (let i = 0; i < cleaned.length; i += 2) bytes.push(parseInt(cleaned.substr(i, 2), 16));
                const offset = parseInt(document.getElementById('disasm-offset').value) || 0;
                const instructions = csDecoder.disasm(bytes, offset);

                if (!instructions.length) { outputDiv.innerHTML = `<div class="status error">${t('errorDisasm')}</div>`; return; }

                lastDisasmResult = instructions;

                let html = `<table class="output-table"><thead><tr>
                    <th>${t('tableAddress')}</th><th>${t('tableBytes')}</th><th>${t('tableInstruction')}</th><th>${t('tableOperands')}</th>
                </tr></thead><tbody>`;
                for (const ins of instructions) {
                    html += `<tr><td class="address">0x${formatHex(ins.address, 8)}</td><td class="bytes">${ins.bytes.map(b => formatHex(b, 2)).join(' ')}</td><td class="mnemonic">${ins.mnemonic}</td><td class="operands">${ins.op_str}</td></tr>`;
                }
                html += `</tbody></table><div class="status success">${t('successDisasm', { count: instructions.length })}</div>`;
                outputDiv.innerHTML = html;
            } catch (e) { outputDiv.innerHTML = `<div class="status error">${e.message}</div>`; }
        }

        function copyDisasmResult() {
            if (!lastDisasmResult || !lastDisasmResult.length) { alert(t('errorEmpty')); return; }
            // 复制格式：指令 操作数（不含地址）
            const lines = lastDisasmResult.map(ins => {
                return `${ins.mnemonic}\t${ins.op_str}`;
            });
            const text = lines.join('\n');
            navigator.clipboard.writeText(text).then(() => alert(t('copied')));
        }

        // ==================== 汇编 ====================
        let ksEncoder = null;
        let lastAsmResult = null;

        function initKsEncoder() {
            const arch = parseInt(document.getElementById('asm-arch').value);
            const mode = parseInt(document.getElementById('asm-mode').value) | parseInt(document.getElementById('asm-endian').value);
            try {
                const newEncoder = new ks.Keystone(arch, mode);
                if (arch === 4) newEncoder.option(ks.OPT_SYNTAX, parseInt(document.getElementById('asm-syntax').value));
                if (ksEncoder) ksEncoder.close();
                ksEncoder = newEncoder;
                return true;
            } catch (e) { console.error('Keystone init error:', e); return false; }
        }

        function assemble() {
            const outputDiv = document.getElementById('asm-output');
            if (!initKsEncoder()) { outputDiv.innerHTML = `<div class="status error">${t('errorInit')}</div>`; return; }

            const input = document.getElementById('asm-input').value.trim();
            if (!input) { outputDiv.innerHTML = `<div class="status error">${t('errorEmpty')}</div>`; return; }

            // 按行分割指令
            const lines = input.split('\n').filter(l => l.trim());

            try {
                // 逐条汇编每条指令
                const results = [];
                let totalBytes = [];
                let failedLines = [];

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;

                    try {
                        const result = ksEncoder.asm(line, 0);
                        if (result && result.length > 0) {
                            const mcArray = result instanceof Uint8Array ? Array.from(result) : result;
                            results.push({
                                instruction: line,
                                bytes: mcArray
                            });
                            totalBytes = totalBytes.concat(mcArray);
                        } else {
                            failedLines.push(i + 1);
                        }
                    } catch (e) {
                        failedLines.push(i + 1);
                    }
                }

                if (results.length === 0) {
                    outputDiv.innerHTML = `<div class="status error">${t('errorAsm')}</div>`;
                    return;
                }

                lastAsmResult = totalBytes;

                // 构建表格
                let html = `<table class="output-table"><thead><tr>
                    <th>${t('tableInstruction')}</th><th>${t('tableBytes')}</th>
                </tr></thead><tbody>`;

                for (const r of results) {
                    const hexBytes = r.bytes.map(b => formatHex(b, 2)).join(' ');
                    html += `<tr><td class="mnemonic">${r.instruction}</td><td class="bytes">${hexBytes}</td></tr>`;
                }

                html += `</tbody></table>`;

                // 显示错误行（如果有）
                if (failedLines.length > 0) {
                    html += `<div class="status error">Line ${failedLines.join(', ')}: ${t('errorAsm')}</div>`;
                }

                html += `<div class="status success">${t('successAsm', { count: results.length, size: totalBytes.length })}</div>`;

                // 显示完整字节
                html += `<div class="result-bytes" id="asm-result-bytes">${formatAsmOutput('hex')}</div>`;

                outputDiv.innerHTML = html;
            } catch (e) {
                outputDiv.innerHTML = `<div class="status error">${t('errorAsm')}: ${e.message || e}</div>`;
            }
        }

        function formatAsmOutput(format) {
            if (!lastAsmResult || !lastAsmResult.length) return '';
            switch (format) {
                case 'hex':
                    return lastAsmResult.map(b => formatHex(b, 2)).join(' ');
                case 'inline':
                    return lastAsmResult.map(b => '\\x' + formatHex(b, 2)).join('');
                case 'carray':
                    const cBytes = lastAsmResult.map(b => '0x' + formatHex(b, 2)).join(', ');
                    return `unsigned char opcodes[] = {\n    ${cBytes},\n};`;
                case 'python':
                    const pyBytes = lastAsmResult.map(b => '0x' + formatHex(b, 2)).join(', ');
                    return `opcodes = [\n    ${pyBytes},\n]`;
                default:
                    return lastAsmResult.map(b => formatHex(b, 2)).join(' ');
            }
        }

        function updateAsmResultFormat() {
            const resultDiv = document.getElementById('asm-result-bytes');
            if (resultDiv && lastAsmResult && lastAsmResult.length) {
                const format = document.getElementById('asm-copy-format').value;
                resultDiv.textContent = formatAsmOutput(format);
            }
        }

        function copyAsmResult() {
            if (!lastAsmResult || !lastAsmResult.length) { alert(t('errorEmpty')); return; }
            const format = document.getElementById('asm-copy-format').value;
            navigator.clipboard.writeText(formatAsmOutput(format)).then(() => alert(t('copied')));
        }

        // ==================== 布局切换 ====================
        let currentLayout = 'stacked'; // 'stacked' or 'side-by-side'

        function toggleLayout() {
            const container = document.querySelector('.cards-container');
            const icon = document.getElementById('layout-icon');

            if (currentLayout === 'stacked') {
                currentLayout = 'side-by-side';
                container.classList.add('side-by-side');
                // 切换为横向图标
                icon.innerHTML = '<path d="M4 4h6v16H4V4zm10 0h6v16h-6V4z"/>';
            } else {
                currentLayout = 'stacked';
                container.classList.remove('side-by-side');
                // 切换为网格图标
                icon.innerHTML = '<path d="M3 3h8v8H3V3zm0 10h8v8H3v-8zm10-10h8v8h-8V3zm0 10h8v8h-8v-8z"/>';
            }
            localStorage.setItem('layout', currentLayout);
        }

        function initLayout() {
            const savedLayout = localStorage.getItem('layout');
            const container = document.querySelector('.cards-container');
            const icon = document.getElementById('layout-icon');

            // 检查浏览器宽度，如果足够宽且用户之前选择了并排，则恢复
            if (savedLayout === 'side-by-side' && window.innerWidth >= 1000) {
                currentLayout = 'side-by-side';
                container.classList.add('side-by-side');
                icon.innerHTML = '<path d="M4 4h6v16H4V4zm10 0h6v16h-6V4z"/>';
            }
        }

        // 窗口大小变化时检查
        window.addEventListener('resize', function() {
            const container = document.querySelector('.cards-container');
            if (currentLayout === 'side-by-side' && window.innerWidth < 1000) {
                // 屏幕太窄，强制切换为堆叠
                currentLayout = 'stacked';
                container.classList.remove('side-by-side');
                document.getElementById('layout-icon').innerHTML = '<path d="M3 3h8v8H3V3zm0 10h8v8H3v-8zm10-10h8v8h-8V3zm0 10h8v8h-8v-8z"/>';
            }
        });
        document.addEventListener('DOMContentLoaded', function() {
            // 使用在渲染前设置的语言
            currentLang = window.__initialLang || 'zh';
            document.getElementById('lang-icon').textContent = currentLang === 'zh' ? 'EN' : '中';
            document.getElementById('theme-icon').textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
            // 初始化布局
            initLayout();
            // 立即应用语言，避免闪烁
            updateLanguage();
        });
    </script>
